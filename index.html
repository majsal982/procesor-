<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maszyna RAM</title>
  <link href="style.css" rel="stylesheet">
  <script src="script.js"></script>
</head>
<body>
  <main>
    <h2>RAM Machine</h2>
    <section id="lewy">
      <div id="processor">
      <h3>PROCESSOR</h3>
      Instruction: <input type="text" readonly><br><br>
      Argument: <input type="text" readonly>
      </div>
      <!-- Połączenie pamięci !! -->
    <div id="pamiec-kontener">
        <object data="pamiec.html" type="text/html" style="width: 250px; height: 600px;"></object>
    </div>

 
  
  
      
    </section>
    <div id="paseczek-kolor"></div>
    <section id="prawy">
       <div class="tasma-wejscie">
            <div class="numeracja"></div>
            <div class="strzalka" >▼</div>
            <div class="kom-ts">
                <button class="przycisk">«</button>
                <button class="przycisk">‹</button>
                <div class="komorka"></div>
                <div class="komorka"></div>
                <div class="komorka"></div>
                <div class="komorka"></div>
                <div class="komorka"></div>
                <button class="przycisk">›</button>
            </div>
            <div class="p-ts">WEJŚCIE</div>
            <div>
                <input type="number" id="nowaWartosc" placeholder="liczba">
                <button onclick="dodaj()">DODAJ</button>
            </div>
        </div>
              <div class="p-ts">WEJŚCIE</div>
          </div>
          <div class="tasma-wyjscie">
          <div class="p-ts">WYJŚCIE</div>
            <div class="kom-ts">
                <button class="przycisk">«</button>
                <button class="przycisk">‹</button>
                <div class="komorka"></div>
                <div class="komorka"></div>
                <div class="komorka"></div>
                <div class="komorka"></div>
                <div class="komorka"></div>
                <button class="przycisk">›</button>
            </div>
            <div class="strzalka" >▲</div>
            <div class="numeracja" ></div>
        </div>
      </div>
      <!-- W sekcji "lewy" pod procesorem -->
    <div id="pamiec-kontener">
      <!-- Wczytujemy pamięć -->
      <object data="pamiec.html" type="text/html" id="obj-pamiec" style="width:100%; height:300px;"></object>
    </div>
    
    <!-- W sekcji "prawy" na samym dole -->
    <div id="linijki-kontener">
      <!-- Panel sterowania -->
      <div style="padding: 10px; background: #eee; border: 1px solid #ccc;">
          <button onclick="step()">KROK PO KROKU</button>
          <button onclick="runAuto()" style="background: lightgreen;">AUTO (START)</button>
          <button onclick="stop()" style="background: lightcoral;">STOP / RESET</button>
          <button onclick="addRow()">+ DODAJ LINIE</button>
      </div>
      <!-- Wczytujemy edytor -->
      <object data="plik.html" type="text/html" id="obj-edytor" style="width:100%; height:400px;"></object>
    </div>
    </section>
  </main>
  <footer>
    <p id="p-footer">...</p>
  </footer>
</body>
</html>
