<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maszyna RAM</title>
  <link href="style.css" rel="stylesheet">
  <script src="script.js"></script>
</head>
<body>
  <main>
    <h2>RAM Machine</h2>
    <section id="lewy">
      <div id="processor">
      <h3>PROCESSOR</h3>
      Instruction: <input id="instruction" type="text" readonly><br><br>
      Argument: <input id="argument" type="text" readonly>
      </div>
      <!-- Połączenie pamięci !! -->
     <div id="pamiec-kontener" style="padding: 10px;">
        <h3>MEMORY</h3>
        <!-- Tabela pamięci zostanie wygenerowana tutaj -->
        <table id="ramTable" border="1" style="width:100%; border-collapse: collapse; background: white; text-align: center;">
            <thead style="background: #2c3e50; color: white;">
                <tr><th>Addr</th><th>Val</th></tr>
            </thead>
            <tbody></tbody>
        </table>

        <div>
    <button onclick="scrollUp()">⬆</button>
    <button onclick="scrollDown()">⬇</button>
    <br><br>
    <button onclick="openModal()">Show Address</button>
</div>



<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Show Address</h3>
        <input type="number" id="modalInput" placeholder="Podaj adres">
        <br>
        <button onclick="goToAddress()">Go!</button>
        <button onclick="closeModal()">Anuluj</button>
    </div>


      </div>
    </section>

    <div id="paseczek-kolor"></div>

    <section id="prawy">
      <!-- TAŚMY (Górna część prawego panelu) -->
      <div id="tasmy-miejsce" style="background: #ddd; padding: 10px; margin-bottom: 10px;">
          <div class="tasma-wejscie">
              <div class="p-ts">WEJŚCIE</div>
              <div id="input-head" class="strzalka">▼</div>
              <div id="input-strip" class="kom-ts"></div>
              <div id="input-numbers" class="numeracja"></div>
              <input type="number" id="val-in" placeholder="liczba">
              <button onclick="addToIn()">DODAJ</button>
          </div>
          <div class="tasma-wejscie" style="margin-top: 10px;">
              <div class="p-ts">WYJŚCIE</div>
              <div id="output-head" class="strzalka">▲</div>
              <div id="output-strip" class="kom-ts"></div>
              <div id="output-numbers" class="numeracja"></div>
          </div>
      </div>

      <!-- EDYTOR (Dolna część prawego panelu) -->
      <div id="linijki-kontener" style="background: white; padding: 10px;">
        <div id="panel-sterowania" style="margin-bottom: 5px;">
            <button onclick="step()">KROK PO KROKU</button>
            <button onclick="runAuto()" style="background: lightgreen;">AUTO (START)</button>
            <button onclick="stop()" style="background: lightcoral;">STOP / RESET</button>
            <button onclick="addRow()">+ DODAJ LINIE</button>
        </div>
        
        <table id="ram-table" border="1" style="width: 100%; border-collapse: collapse;">
            <thead style="background: #b8d9e9;">
                <tr>
                    <th style="width: 40px;">LN</th>
                    <th>Label</th>
                    <th>Instruction</th>
                    <th>Argument</th>
                    <th>Comment</th>
                </tr>
            </thead>
            <tbody id="editor-body"></tbody>
        </table>
      </div>
    </section>
  </main>
  <footer>
    <p id="p-footer">...</p>
  </footer>
</body>
</html>
