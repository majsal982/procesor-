<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kontrolka RAM</title>
<style>
   body {
        font-family: Arial;
        background: #eef2f5;
        padding: 20px;
    }

    #blok{
        width:200px;
        text-align: center;
    }

    #ramtable {
        border-collapse: collapse;
        margin: 20px auto;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
 
  th, td {
        padding: 10px 20px;
        border: 1px solid #ccc;
        text-align: center;
    }

    th {
        background: #2c3e50;
        color: white;
    }

    .acc {
        background: #ffd54f;
        font-weight: bold;
    }

    .unknown {
        background: #ccc;
        color: #555;
    }

    .addrShade {
        background: linear-gradient(to right, #e3f2fd, #90caf9);
    }

    button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        background: #3498db;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #2980b9;
    }

    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
    }

    .modal-content {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 300px;
        margin: 15% auto;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input {
        padding: 8px;
        width: 80%;
        margin-bottom: 10px;
    }
</style>
</head>
<body>

<div id="blok"> 

<table id="ramTable">
    <thead>
        <tr>
            <th>Address</th>
            <th>Value</th>
        </tr> 
    </thead>
    <tbody></tbody>
</table>

<div>
    <button onclick="scrollUp()">⬆</button>
    <button onclick="scrollDown()">⬇</button>
    <br><br>
    <button onclick="openModal()">Show Address</button>
</div>



<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Show Address</h3>
        <input type="number" id="modalInput" placeholder="Podaj adres">
        <br>
        <button onclick="goToAddress()">Go!</button>
        <button onclick="closeModal()">Anuluj</button>
    </div>
    
</div>

</div>
<script>

</script>

</body>
</html>
