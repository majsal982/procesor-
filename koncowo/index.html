<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAM Machine 2026</title>
    <link rel="stylesheet" href="wyglad.css">
</head>
<body>
<!-- Beata: Toolbar and application shell -->
<div class="toolbar">
    <div class="toolbar-group">
        <button class="tool-btn" onclick="location.reload()" title="Nowy"><img src="https://img.icons8.com/material-outlined/20/000000/new-file.png"></button>
        <button class="tool-btn" onclick="document.getElementById('file-input').click()" title="Otwórz"><img src="https://img.icons8.com/material-outlined/20/000000/folder-invoices.png"></button>
        <button class="tool-btn" onclick="saveToFile()" title="Zapisz"><img src="https://img.icons8.com/material-outlined/20/000000/save.png"></button>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
        <button class="tool-btn" onclick="runAuto()" title="Start"><img src="https://img.icons8.com/material-sharp/20/228BE6/play.png"></button>
        <button class="tool-btn" onclick="pause()" title="Pauza"><img src="https://img.icons8.com/material-sharp/20/000000/pause.png"></button>
        <button class="tool-btn" onclick="step()" title="Krok"><img src="https://img.icons8.com/material-sharp/20/228BE6/fast-forward.png"></button>
        <button class="tool-btn" onclick="stop()" title="Reset"><img src="https://img.icons8.com/material-outlined/20/FD7E14/restart.png"></button>
    </div>
</div>
<section id="lewy">

<!-- IGOR: Processor display section -->

<!-- LILIANA: Memory panel section -->

<div id="pamiec-kontener">
    <h3>MEMORY</h3>
    <div class="table-wrapper">
        <table>
            <thead><tr><th>Addr</th><th>Value</th></tr></thead>
            <tbody id="memory-body"></tbody>
        </table>
    </div>
    <div class="memory-nav">
        <button onclick="scrollMemory(-1)">▲</button>
        <button class="btn-show-addr" onclick="showAddressPrompt()">Show Address...</button>
        <button onclick="scrollMemory(1)">▼</button>
    </div>
</div>
</section>
<!-- BEATA: Input tape UI -->
<section id="prawy">
    <div class="tasma-sekcja" id="sec-input">
    <div class="tasma-label">wejście</div>
    <div class="tasma-kontener">
        <div id="input-head" class="strzalka">▼</div>
        <div id="input-strip" class="kom-ts"></div>
        <div id="input-numbers" class="numeracja"></div>
    </div>
    <div class="add-box">
        <input type="number" id="val-in" placeholder="Liczba">
        <button onclick="addToIn()">DODAJ</button>
        </div>
    </div>
<!-- BEATA: Output tape UI -->
<div class="tasma-sekcja" id="sec-output">
    <div class="tasma-label">wyjście</div>
        <div class="tasma-kontener">
        <div id="output-head" class="strzalka">▼</div>
        <div id="output-strip" class="kom-ts"></div>
        <div id="output-numbers" class="numeracja"></div>
    </div>
</div>
<!-- MAJA linijki-->
<div id="edytor">
                <div id="panel-sterowania">
                    <button class="btn-ctrl" onclick="step()">KROK</button>
                    <button class="btn-ctrl btn-start" onclick="runAuto()">START</button>
                    <button class="btn-ctrl btn-reset" onclick="stop()">↺ RESET</button>
                    <button class="btn-ctrl" onclick="addRow()">+ LINIA</button>
                </div>
                <div class="table-wrapper-editor">
                    <table>
                        <thead><tr><th>LN</th><th>Label</th><th>Instruction</th><th>Arg</th><th>Comment</th></tr></thead>
                        <tbody id="editor-body"></tbody>
                    </table>
                </div>
            </div>
    </section>
</main>
</body>
</html>
